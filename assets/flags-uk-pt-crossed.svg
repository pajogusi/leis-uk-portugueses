<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-label="Bandeiras cruzadas do Reino Unido e de Portugal">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#777"/>
      <stop offset="35%" stop-color="#f5f5f5"/>
      <stop offset="65%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>

    <linearGradient id="clothShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <rect width="640" height="420" fill="none"/>

  <!-- Poles -->
  <g filter="url(#shadow)">
    <line x1="235" y1="70" x2="405" y2="385" stroke="url(#pole)" stroke-width="11" stroke-linecap="round"/>
    <line x1="405" y1="70" x2="235" y2="385" stroke="url(#pole)" stroke-width="11" stroke-linecap="round"/>

    <polygon points="230,67 240,35 250,67" fill="url(#pole)" stroke="#555" stroke-width="1"/>
    <circle cx="240" cy="72" r="10" fill="url(#pole)" stroke="#555" stroke-width="1"/>

    <polygon points="390,67 400,35 410,67" fill="url(#pole)" stroke="#555" stroke-width="1"/>
    <circle cx="400" cy="72" r="10" fill="url(#pole)" stroke="#555" stroke-width="1"/>
  </g>

  <!-- UK flag -->
  <g transform="translate(54,102)" filter="url(#shadow)">
    <path d="M0,30 C50,0 95,0 145,28 C190,53 235,50 286,22 L286,170 C238,198 190,198 145,172 C96,143 48,145 0,176 Z" fill="#012169"/>

    <clipPath id="ukclip">
      <path d="M0,30 C50,0 95,0 145,28 C190,53 235,50 286,22 L286,170 C238,198 190,198 145,172 C96,143 48,145 0,176 Z"/>
    </clipPath>

    <g clip-path="url(#ukclip)">
      <path d="M-30,0 L20,0 L320,190 L265,190 Z" fill="#fff"/>
      <path d="M265,0 L320,0 L20,190 L-30,190 Z" fill="#fff"/>
      <path d="M-15,0 L15,0 L315,190 L285,190 Z" fill="#C8102E"/>
      <path d="M285,0 L315,0 L15,190 L-15,190 Z" fill="#C8102E"/>

      <rect x="118" y="-20" width="52" height="230" fill="#fff"/>
      <rect x="-20" y="78" width="340" height="46" fill="#fff"/>

      <rect x="130" y="-20" width="28" height="230" fill="#C8102E"/>
      <rect x="-20" y="88" width="340" height="26" fill="#C8102E"/>
    </g>

    <path d="M0,30 C50,0 95,0 145,28 C190,53 235,50 286,22 L286,170 C238,198 190,198 145,172 C96,143 48,145 0,176 Z" fill="url(#clothShade)"/>
  </g>

  <!-- Portugal flag -->
  <g transform="translate(302,102)" filter="url(#shadow)">
    <clipPath id="ptclip">
      <path d="M0,22 C50,50 95,53 145,28 C190,0 238,2 286,30 L286,176 C238,145 190,143 145,172 C96,198 48,198 0,170 Z"/>
    </clipPath>

    <path d="M0,22 C50,50 95,53 145,28 C190,0 238,2 286,30 L286,176 C238,145 190,143 145,172 C96,198 48,198 0,170 Z" fill="#006600"/>

    <g clip-path="url(#ptclip)">
      <rect x="0" y="-5" width="115" height="220" fill="#006600"/>
      <rect x="115" y="-5" width="190" height="220" fill="#FF0000"/>
    </g>

    <!-- Simplified Portuguese coat of arms -->
    <g transform="translate(115,96)">
      <circle r="38" fill="none" stroke="#FFD700" stroke-width="8"/>
      <circle r="27" fill="none" stroke="#D5A600" stroke-width="3"/>
      <line x1="-38" y1="0" x2="38" y2="0" stroke="#FFD700" stroke-width="4"/>
      <line x1="0" y1="-38" x2="0" y2="38" stroke="#FFD700" stroke-width="4"/>
      <path d="M-21,-24 H21 V8 C21,28 0,39 0,39 C0,39 -21,28 -21,8 Z" fill="#fff" stroke="#222" stroke-width="2"/>
      <rect x="-16" y="-19" width="32" height="11" fill="#D00000"/>
      <circle cx="-10" cy="-13.5" r="2.2" fill="#FFD700"/>
      <circle cx="0" cy="-13.5" r="2.2" fill="#FFD700"/>
      <circle cx="10" cy="-13.5" r="2.2" fill="#FFD700"/>
      <circle cx="-8" cy="1" r="4" fill="#0055A4"/>
      <circle cx="8" cy="1" r="4" fill="#0055A4"/>
      <circle cx="0" cy="14" r="4" fill="#0055A4"/>
    </g>

    <path d="M0,22 C50,50 95,53 145,28 C190,0 238,2 286,30 L286,176 C238,145 190,143 145,172 C96,198 48,198 0,170 Z" fill="url(#clothShade)"/>
  </g>
</svg>
